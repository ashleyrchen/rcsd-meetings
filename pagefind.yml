# Pagefind indexer config — see SEARCH.md (repo root) for architecture & rationale.
#
# Pagefind crawls the BUILT site in docs/ and writes the search bundle to
# docs/pagefind/. It splits the index by each page's <html lang> attribute, so
# English pages and Spanish pages land in separate per-language indexes. The
# search UI on any page only queries the index matching that page's language —
# this is what guarantees an EN page searches only the EN corpus and an ES page
# only the ES corpus.

site: docs

# Exclude the shared chrome rendered on every page (siteNav / siteFooter from
# scripts/html-parts.mjs). Without this, nav labels and footer boilerplate would
# match on every query and pollute results. Done here rather than via
# data-pagefind-ignore so we don't have to touch all ~452 generated pages.
exclude_selectors:
  - "nav.site-nav"
  - "footer.site-footer"
