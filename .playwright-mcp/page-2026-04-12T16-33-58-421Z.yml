        - listitem [ref=e44]: / Chronic Absenteeism Data
      - generic [ref=e45]:
        - heading "Chronic Absenteeism Data" [level=1] [ref=e46]
        - text: Downloadable data files containing Chronic Absenteeism data by race/ethnicity, gender, student group, and grade span. "Eligible" cumulative enrollment, chronic absenteeism counts, and chronic absenteeism rate data are provided.
        - separator [ref=e47]
      - generic [ref=e48]:
        - generic [ref=e49]:
          - paragraph [ref=e50]: Files include state, county, district, and school-level data. Refer to the file structure for further details regarding the file contents. Data are not included for districts and independently reporting charter schools (IRCs) that did not certify their California Longitudinal Pupil Achievement Data System (CALPADS) End-of-Year 3 submission.
          - paragraph [ref=e51]:
            - strong [ref=e52]: "Note:"
            - text: To protect student privacy, data are suppressed (*) on the Chronic Absenteeism downloadable files if the cell size within a selected student population (Chronic Absenteeism Eligible Cumulative Enrollment) is 10 or less. Additionally, for Race/Ethnicity, "Not Reported" is suppressed, regardless of actual cell size, if the student population for one or more other race/ethnicity groups is suppressed.
          - paragraph [ref=e53]:
            - strong [ref=e54]: "PLEASE BE ADVISED:"
            - text: The COVID-19 pandemic resulted in statewide physical school closures in February/March 2020 followed by the widespread implementation of distance learning during the 2020–21 academic year. The California Department of Education (CDE) has determined that absenteeism data are
            - strong [ref=e55]: not
            - text: valid and reliable for the 2019–20 academic year; therefore, the CDE has not processed these data and they are unavailable for public release. The CDE recommends caution when comparing
            - emphasis [ref=e56]: absenteeism
            - text: data across academic years. For more information about the impact of COVID-19 on data reporting, please visit the
            - link "CDE COVID-19 and Data Reporting" [ref=e57] [cursor=pointer]:
              - /url: coviddatareporting.asp
            - text: web page.
