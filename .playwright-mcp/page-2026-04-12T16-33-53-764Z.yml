        - listitem [ref=e44]: / Enrollment by ELAS, LTEL, and At-Risk by Grade
      - generic [ref=e45]:
        - heading "Enrollment by ELAS, LTEL, and At-Risk by Grade" [level=1] [ref=e46]
        - text: Downloadable data files of enrollment by English Language Acquisition Status (ELAS), Long-Term English Learner (LTEL) status, and At-Risk of becoming LTEL status by grade.
        - separator [ref=e47]
      - generic [ref=e48]:
        - generic [ref=e49]:
          - generic [ref=e50]:
            - paragraph [ref=e51]:
              - text: This page contains downloadable files pertaining to the count of students enrolled by grade on Census Day (the first Wednesday in October) by English Language Acquisition Status (ELAS) from the California Longitudinal Pupil Achievement Data System (CALPADS) and Long-Term English Learner (LTEL) and At-Risk of becoming LTEL statuses, as determined pursuant to California Education Code (EC)
              - emphasis [ref=e52]: Section
              - text: 313.1. The possible ELAS categories are English Only (EO), English Learner (EL), Initial Fluent English Proficient (IFEP), Reclassified Fluent English Proficient (RFEP), and To Be Determined (TBD).
            - paragraph [ref=e53]:
              - strong [ref=e54]: "Please Note:"
              - text: The LTEL data included in this report are based on the definition set forth in Education Code (EC) section 313.1; they are not based on the definition used for accountability in the California School Dashboard set forth in EC 52052(c). For more information, please consult the
              - link "Long-Term English Learner (LTEL) Students" [ref=e55] [cursor=pointer]:
                - /url: lteldef.asp
              - text: web page.
